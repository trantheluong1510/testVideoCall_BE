services:
  livekit:
    image: livekit/livekit-server
    container_name: livekit-server
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command: >
      --keys "devkey: devkey_secret_32_characters_long_key"
      --node-ip 0.0.0.0
    restart: unless-stopped

networks:
  default:
    name: videocall-network
